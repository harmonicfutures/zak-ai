capability: zak.dev.filesystem.tree
version: 1.0.0
adapter:
  key: ide-phase1
  route: dev.filesystem.tree
execution_class: A
authority_requirements: none
description: Read-only workspace file tree for a reality or explicit workspace root (runtime-server contract)
tags:
  - zak
  - dev
input_schema:
  type: object
  required:
    - runtimeServerUrl
  properties:
    runtimeServerUrl:
      type: string
      minLength: 1
    realityId:
      type: string
    workspaceRoot:
      type: string
    depth:
      type: integer
      minimum: 0
    maxNodes:
      type: integer
      minimum: 1
  additionalProperties: false
output_schema:
  type: object
  required:
    - ok
  properties:
    ok:
      type: boolean
    workspaceRoot:
      type: string
    tree:
      type: array
    error:
      type: string
  additionalProperties: true
golden:
  input:
    runtimeServerUrl: http://localhost:3001
    workspaceRoot: /tmp
