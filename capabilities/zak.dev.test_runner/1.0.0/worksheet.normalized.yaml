adapter:
  key: ide-phase1
  route: dev.test_runner
authority_requirements: standard
capability: zak.dev.test_runner
description: Executes npm test against the emitted test.spec.ts for a compiled
  capability. Verifies definition hash integrity and golden input validation. A
  failing test blocks progression to membrane proposal. Maximum 3
  self-correction attempts before emitting a failed_compilation receipt and
  stopping.
execution_class: B
golden:
  input:
    attempt_number: 1
    capability_id: zak.sys.list_capabilities
    version: 1.0.0
idempotency: inherent
input_schema:
  additionalProperties: false
  properties:
    attempt_number:
      default: 1
      description: Which self-correction attempt this is. Must be 1, 2, or 3. If 3
        fails, emit failed_compilation receipt and stop.
      maximum: 3
      minimum: 1
      type: integer
    capability_id:
      description: The capability identifier to test.
      pattern: ^(hai|zak)\.[a-z][a-z0-9_.]*$
      type: string
    self_correction_context:
      description: Optional. The error output from a previous failed attempt, passed
        so ZAK can reason about the correction needed.
      type: string
    version:
      description: SemVer version string.
      pattern: ^\d+\.\d+\.\d+$
      type: string
  required:
    - capability_id
    - version
  type: object
output_schema:
  additionalProperties: false
  properties:
    attempt_number:
      type: integer
    capability_id:
      type: string
    definition_hash_verified:
      type: boolean
    error_output:
      type: string
    golden_input_validated:
      type: boolean
    halt:
      type: boolean
    passed:
      type: boolean
    self_correction_possible:
      type: boolean
    version:
      type: string
  required:
    - passed
    - capability_id
    - version
    - attempt_number
  type: object
replay_behavior: allowed_read_only_subset
side_effect_tier: low
tags:
  - dev
  - test
  - vitest
  - verification
version: 1.0.0
