capability: zak.dev.test_runner
version: 1.0.0
description: >-
  Executes npm test against the emitted test.spec.ts for a compiled capability. Verifies definition hash integrity and
  golden input validation. A failing test blocks progression to membrane proposal. Maximum 3 self-correction attempts
  before emitting a failed_compilation receipt and stopping.
tags:
  - dev
  - test
  - vitest
  - verification
adapter:
  key: ide-phase1
  route: dev.test_runner
execution_class: B
authority_requirements: standard
side_effect_tier: low
idempotency: inherent
replay_behavior: allowed_read_only_subset
input_schema:
  type: object
  properties:
    capability_id:
      type: string
      description: The capability identifier to test.
      pattern: ^(hai|zak)\.[a-z][a-z0-9_.]*$
    version:
      type: string
      description: SemVer version string.
      pattern: ^\d+\.\d+\.\d+$
    attempt_number:
      type: integer
      description: Which self-correction attempt this is. Must be 1, 2, or 3. If 3 fails, emit failed_compilation receipt and stop.
      minimum: 1
      maximum: 3
      default: 1
    self_correction_context:
      type: string
      description: Optional. The error output from a previous failed attempt, passed so ZAK can reason about the correction needed.
  required:
    - capability_id
    - version
  additionalProperties: false
output_schema:
  type: object
  properties:
    passed:
      type: boolean
    capability_id:
      type: string
    version:
      type: string
    definition_hash_verified:
      type: boolean
    golden_input_validated:
      type: boolean
    attempt_number:
      type: integer
    error_output:
      type: string
    self_correction_possible:
      type: boolean
    halt:
      type: boolean
  required:
    - passed
    - capability_id
    - version
    - attempt_number
  additionalProperties: false
golden:
  input:
    capability_id: zak.sys.list_capabilities
    version: 1.0.0
    attempt_number: 1
