adapter:
  key: hai-adapter
  route: particle.update
authority_requirements: none
capability: hai.particle.update
description: "Particle update v2: attributes must include revision"
execution_class: B
golden:
  input:
    attributes:
      hue: 0.5
      revision: 1
    particle_id: x
idempotency: none
input_schema:
  additionalProperties: true
  properties:
    attributes:
      additionalProperties: true
      properties:
        hue:
          maximum: 1
          minimum: 0
          type: number
        revision:
          minimum: 0
          type: integer
      required:
        - revision
      type: object
    particle_id:
      minLength: 1
      type: string
    timestamp:
      type: string
  required:
    - particle_id
    - attributes
  type: object
output_schema:
  ok: string
replay_behavior: blocked
side_effect_tier: low
tags:
  - hai
  - particle
version: 2.0.0
