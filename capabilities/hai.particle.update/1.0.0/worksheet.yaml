# Multi-version layout — use: cap-compile compile ... --nested-version
capability: hai.particle.update
version: 1.0.0
adapter:
  key: hai-adapter
  route: particle.update
execution_class: B
authority_requirements: none
side_effect_tier: low
idempotency: none
replay_behavior: blocked
description: Update HAI particle attributes (UI / adapter structured input)
tags:
  - hai
  - particle
input_schema:
  type: object
  required:
    - particle_id
    - attributes
  properties:
    particle_id:
      type: string
      minLength: 1
    attributes:
      type: object
    timestamp:
      type: string
  additionalProperties: true
output_schema:
  ok: string
golden:
  input:
    particle_id: demo-1
    attributes:
      hue: 0.5
