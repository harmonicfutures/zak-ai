adapter:
  key: ide-phase1
  route: dev.propose_membrane_admission
authority_requirements: elevated
capability: zak.dev.propose_membrane_admission
description: Formalizes the membrane whitelisting step as a governed proposal.
  After a capability compiles and tests pass, ZAK issues a proposal.json receipt
  containing the capability_id, version, definition_hash, and a cryptographic
  signature. The human reviews and seals the proposal with one click — updating
  capability_snapshot.json only under that authorization. Replaces ungoverned
  hand-editing of the snapshot.
execution_class: B
golden:
  input:
    capability_id: zak.sys.list_capabilities
    compile_receipt_id: compile-receipt-golden-001
    definition_hash: golden-test-hash-placeholder
    idempotency_key: zak.dev.propose_membrane_admission:zak.sys.list_capabilities:1.0.0:golden-test-hash-placeholder
    justification: Enables ZAK to inspect existing capabilities before authoring new
      ones, preventing duplication.
    test_receipt_id: test-receipt-golden-001
    version: 1.0.0
idempotency: keyed
input_schema:
  additionalProperties: false
  properties:
    capability_id:
      description: The capability identifier being proposed for membrane admission.
      pattern: ^(hai|zak)\.[a-z][a-z0-9_.]*$
      type: string
    compile_receipt_id:
      description: The receipt_id from the zak.dev.compile execution. Links the
        proposal to a specific compilation event.
      type: string
    definition_hash:
      description: The definition hash from the compiled definition.hash file. Must
        match the compiled artifact exactly.
      type: string
    idempotency_key:
      description: Stable key for replay-safe membrane proposals. Bind capability_id,
        version, and definition_hash.
      type: string
    justification:
      description: Human-readable justification for membrane admission. What does this
        capability enable and why does it belong in the membrane?
      type: string
    test_receipt_id:
      description: The receipt_id from the zak.dev.test_runner execution that verified
        this capability. Links the proposal to verified test passage.
      type: string
    version:
      description: SemVer version string.
      pattern: ^\d+\.\d+\.\d+$
      type: string
  required:
    - capability_id
    - version
    - definition_hash
    - test_receipt_id
    - compile_receipt_id
    - justification
    - idempotency_key
  type: object
output_schema:
  additionalProperties: false
  properties:
    capability_id:
      type: string
    definition_hash:
      type: string
    proposal_id:
      type: string
    proposal_receipt_path:
      type: string
    proposed_at:
      type: integer
    status:
      enum:
        - pending_human_seal
        - sealed
        - rejected
      type: string
    version:
      type: string
  required:
    - proposal_id
    - capability_id
    - version
    - definition_hash
    - proposal_receipt_path
    - status
    - proposed_at
  type: object
replay_behavior: blocked
side_effect_tier: medium
tags:
  - dev
  - membrane
  - admission
  - proposal
  - governance
version: 1.0.0
