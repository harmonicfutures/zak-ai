capability: zak.dev.compile
version: 1.0.0
description: >-
  Executes the capability compiler (node dist/cli.js compile) against a worksheet.yaml. Emits definition.json,
  definition.hash, meta.json, test.fixture.json, and test.spec.ts. Does not modify capability_snapshot.json. Does not
  whitelist in the membrane. Compilation is the transition from YAML worksheet to registry artifact.
tags:
  - dev
  - compile
  - capability-compiler
  - registry
adapter:
  key: ide-phase1
  route: dev.compile
execution_class: B
authority_requirements: elevated
side_effect_tier: medium
idempotency: keyed
replay_behavior: allowed_same_key
input_schema:
  type: object
  properties:
    capability_id:
      type: string
      description: The capability identifier to compile.
      pattern: ^(hai|zak)\.[a-z][a-z0-9_.]*$
    version:
      type: string
      description: SemVer version string.
      pattern: ^\d+\.\d+\.\d+$
    nested_version:
      type: boolean
      description: Whether to emit under capabilities/<cap>/<version>/ layout. Defaults to false.
      default: false
    out_dir:
      type: string
      description: Output directory for compiled artifacts. Defaults to ../capabilities.
      default: ../capabilities
    idempotency_key:
      type: string
      description: Stable key for replay-safe compilation. Bind capability_id, version, nested_version, and out_dir.
  required:
    - capability_id
    - version
    - idempotency_key
  additionalProperties: false
output_schema:
  type: object
  properties:
    success:
      type: boolean
    capability_id:
      type: string
    version:
      type: string
    definition_hash:
      type: string
    emitted_files:
      type: array
      items:
        type: string
    error:
      type: string
  required:
    - success
    - capability_id
    - version
  additionalProperties: false
golden:
  input:
    capability_id: zak.sys.list_capabilities
    version: 1.0.0
    nested_version: false
    idempotency_key: zak.dev.compile:zak.sys.list_capabilities:1.0.0:false:../capabilities
