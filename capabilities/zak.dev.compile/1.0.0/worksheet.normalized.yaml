adapter:
  key: ide-phase1
  route: dev.compile
authority_requirements: elevated
capability: zak.dev.compile
description: Executes the capability compiler (node dist/cli.js compile) against
  a worksheet.yaml. Emits definition.json, definition.hash, meta.json,
  test.fixture.json, and test.spec.ts. Does not modify capability_snapshot.json.
  Does not whitelist in the membrane. Compilation is the transition from YAML
  worksheet to registry artifact.
execution_class: B
golden:
  input:
    capability_id: zak.sys.list_capabilities
    idempotency_key: zak.dev.compile:zak.sys.list_capabilities:1.0.0:false:../capabilities
    nested_version: false
    version: 1.0.0
idempotency: keyed
input_schema:
  additionalProperties: false
  properties:
    capability_id:
      description: The capability identifier to compile.
      pattern: ^(hai|zak)\.[a-z][a-z0-9_.]*$
      type: string
    idempotency_key:
      description: Stable key for replay-safe compilation. Bind capability_id,
        version, nested_version, and out_dir.
      type: string
    nested_version:
      default: false
      description: Whether to emit under capabilities/<cap>/<version>/ layout.
        Defaults to false.
      type: boolean
    out_dir:
      default: ../capabilities
      description: Output directory for compiled artifacts. Defaults to ../capabilities.
      type: string
    version:
      description: SemVer version string.
      pattern: ^\d+\.\d+\.\d+$
      type: string
  required:
    - capability_id
    - version
    - idempotency_key
  type: object
output_schema:
  additionalProperties: false
  properties:
    capability_id:
      type: string
    definition_hash:
      type: string
    emitted_files:
      items:
        type: string
      type: array
    error:
      type: string
    success:
      type: boolean
    version:
      type: string
  required:
    - success
    - capability_id
    - version
  type: object
replay_behavior: allowed_same_key
side_effect_tier: medium
tags:
  - dev
  - compile
  - capability-compiler
  - registry
version: 1.0.0
