<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ZAK Draft Test Harness</title>
</head>
<body>
  <p><a href="/agent.html">Execution agent sandbox (pre-ZAK loop)</a></p>
  <h2>ZAK Draft Generator (test only)</h2>
  <p style="max-width: 48rem; color: #444">
    No authority here — model output is hostile input until <code>prepareExecutionRequest</code> passes.
  </p>

  <textarea id="prompt" rows="10" cols="72">You are generating a capability request draft.

Output ONLY JSON. Top-level keys must be exactly "capability" and "input" — no others.

Rules:
- capability must be "hai.particle.update"
- input: particle_id non-empty string, attributes object; attributes.hue if present must be between 0 and 1
- Example particle_id: "demo-1"
</textarea>
  <br /><br />

  <button type="button" id="go">Generate</button>

  <pre id="output" style="margin-top: 1rem; white-space: pre-wrap;"></pre>

  <script>
    document.getElementById("go").onclick = async function run() {
      const el = document.getElementById("output");
      el.textContent = "…";
      el.style.color = "#666";

      const prompt = document.getElementById("prompt").value;

      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });

        const data = await res.json();

        el.textContent = JSON.stringify(data, null, 2);
        if (!data.ok) {
          el.style.color = "darkred";
        } else {
          el.style.color = "darkgreen";
        }
      } catch (e) {
        el.style.color = "darkred";
        el.textContent = JSON.stringify({ ok: false, stage: "client", error: String(e) }, null, 2);
      }
    };
  </script>
</body>
</html>
